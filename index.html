<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAMAMORI | Portfolio</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #00ff88; /* アクセントカラー：ネオングリーン */
            --sub-text: #888888;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 800px;
            padding: 2rem;
            text-align: left;
            border-left: 2px solid var(--accent-color);
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .name-accent {
            color: var(--accent-color);
        }

        p.tagline {
            font-size: 1.2rem;
            color: var(--sub-text);
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }

        .content {
            margin-top: 3rem;
        }

        .section-title {
            font-size: 0.8rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 1rem;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        .footer {
            margin-top: 4rem;
            font-size: 0.8rem;
            color: var(--sub-text);
        }

        /* 装飾用の背景（オプション） */
        .bg-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.02);
            z-index: -1;
            white-space: nowrap;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="bg-text">YAMAMORI</div>

    <div class="container">
        <header>
            <p class="section-title">Identity</p>
            <h1>YAMAMORI<span class="name-accent">.</span></h1>
            <p class="tagline">CREATIVE MIND / MINIMALIST / EXPLORER</p>
        </header>

        <div class="content">
            <p class="section-title">About</p>
            <p>
                静寂の中に情熱を。無駄を削ぎ落とし、本質を追求する。<br>
                山森という名に刻まれた、深く静かな強さを表現に。
            </p>

            <p class="section-title" style="margin-top: 2rem;">Focus</p>
            <ul>
                <li>▹ Web Development</li>
                <li>▹ Visual Design</li>
                <li>▹ Digital Strategy</li>
            </ul>
        </div>

        <footer class="footer">
            &copy; 2026 YAMAMORI. All rights reserved.
        </footer>
    </div>

</body>
</html>
