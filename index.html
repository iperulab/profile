<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>やまもり よしひろ | Profile</title>
    <style>
        /* 全体のスタイル */
        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* カードのデザイン */
        .profile-card {
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .profile-card h1 {
            margin: 10px 0;
            font-size: 24px;
            color: #2c3e50;
        }
        .profile-card p.reading {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        .bio {
            text-align: left;
            margin: 20px 0;
            font-size: 15px;
        }
        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .skill-tag {
            background: #e1f5fe;
            color: #0288d1;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }
        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }
        .footer-text {
            font-size: 12px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <h1>山守 善宏</h1> <p class="reading">やまもり よしひろ</p>
        
        <hr>

        <div class="bio">
            <p>こんにちは！やまもり よしひろです。ここに自分の趣味や、今取り組んでいること、好きな言葉などを自由に書いてください。</p>
        </div>

        <div class="skills">
            <span class="skill-tag">散歩</span>
            <span class="skill-tag">読書</span>
            <span class="skill-tag">HTML学習中</span>
        </div>

        <hr>

        <p class="footer-text">© 2026 Yoshihiro Yamamori</p>
    </div>

</body>
</html>
