<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAMAMORI | Portfolio</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #00ff88; /* ネオンなアクセントカラー */
            --text-color: #ffffff;
            --sub-color: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            border-left: 2px solid var(--accent-color);
            padding: 20px 50px;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-size: 4rem;
            letter-spacing: 0.5rem;
            margin: 0;
            text-transform: uppercase;
            font-weight: 900;
        }

        .name-jp {
            font-size: 1.2rem;
            color: var(--sub-color);
            margin-bottom: 2rem;
        }

        .description {
            font-size: 1rem;
            max-width: 400px;
            line-height: 1.8;
            color: #ccc;
        }

        .glitch {
            position: relative;
            display: inline-block;
        }

        /* 動きを出すためのアニメーション */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .accent-line {
            width: 50px;
            height: 4px;
            background-color: var(--accent-color);
            margin: 20px auto;
        }

        .links {
            margin-top: 30px;
        }

        .links a {
            color: var(--accent-color);
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.9rem;
            transition: 0.3s;
            border: 1px solid var(--accent-color);
            padding: 5px 15px;
        }

        .links a:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glitch">
            <h1>YAMAMORI</h1>
        </div>
        <div class="name-jp">山森</div>
        
        <div class="accent-line"></div>

        <div class="description">
            ここにキャッチコピーや、普段やっている活動を記載します。<br>
            シンプルかつ大胆なデザインで、存在感を演出。
        </div>

        <div class="links">
            <a href="#">Works</a>
            <a href="#">Contact</a>
            <a href="#">SNS</a>
        </div>
    </div>

</body>
</html>
